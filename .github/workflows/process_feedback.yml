name: Process Feedback

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 최초 실행
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 720

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process feedback (polling loop)
        run: python process_feedback.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          POLL_INTERVAL_SECONDS: "300"

      - name: Restart workflow
        if: success() || failure()
        run: |
          RUNNING=$(gh run list --repo ${{ github.repository }} \
            --workflow process_feedback.yml \
            --json status,databaseId \
            --jq '[.[] | select(.status=="in_progress" or .status=="queued")] | length')
          if [ "$RUNNING" -eq 0 ]; then
            echo "실행 중인 인스턴스 없음 — 재시작"
            gh workflow run process_feedback.yml --repo ${{ github.repository }}
          else
            echo "이미 실행 중인 인스턴스 있음 ($RUNNING개) — 재시작 건너뜀"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
